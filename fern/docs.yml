instances:
  - url: listbee-docs.docs.buildwithfern.com
    custom-domain: docs.listbee.so

title: ListBee
logo:
  light: ./docs/assets/logo-light.svg
  dark: ./docs/assets/logo-dark.svg

colors:
  accent-primary: "#F59E0B"
  background: "#FFFFFF"

ai-search:
  location: docs
  system-prompt: |
    You are the ListBee documentation assistant. Answer questions using only
    the ListBee documentation. ListBee is agent-native commerce infrastructure —
    one API call to sell and deliver digital content. Your audience includes
    both human developers and AI agent builders (MCP, n8n, Python SDK).
    If the answer isn't in the docs, say so and point to the relevant resource:
    API reference, console (console.listbee.so), or support (damian@listbee.so).

default-language: python

navbar-links:
  - type: primary
    text: Get API Key
    url: https://console.listbee.so

tabs:
  documentation:
    display-name: Documentation
    icon: book-open
    skip-slug: true
  api:
    display-name: API Reference
    icon: code
  changelog:
    display-name: Changelog
    icon: clock
    changelog: ./docs/changelog

navigation:
  - tab: documentation
    layout:
      - section: Getting Started
        skip-slug: true
        contents:
          - page: Welcome
            path: ./docs/pages/welcome.mdx
          - page: Introduction
            path: ./docs/pages/introduction.mdx
          - page: Quickstart
            path: ./docs/pages/quickstart.mdx

      - section: Core Concepts
        skip-slug: true
        contents:
          - page: Listings
            path: ./docs/pages/listings.mdx
          - page: Orders & Delivery
            slug: orders
            path: ./docs/pages/orders.mdx
          - page: Readiness System
            slug: readiness
            path: ./docs/pages/readiness.mdx
          - page: Payments
            path: ./docs/pages/payments.mdx
          - page: Webhooks
            path: ./docs/pages/webhooks.mdx
          - page: Errors
            path: ./docs/pages/errors.mdx

      - section: Agent Integration
        skip-slug: true
        contents:
          - page: Agent Onboarding Flow
            slug: agent-onboarding
            path: ./docs/pages/agent-onboarding.mdx
          - page: MCP Server
            slug: mcp
            path: ./docs/pages/mcp.mdx
          - page: Claude Code Skill
            slug: claude-code-skill
            path: ./docs/pages/claude-code-skill.mdx
          - page: Python SDK
            path: ./docs/pages/python-sdk.mdx
          - page: n8n Node
            slug: n8n
            path: ./docs/pages/n8n.mdx

      - section: Guides
        skip-slug: true
        contents:
          - page: Authentication
            path: ./docs/pages/authentication.mdx
          - page: Idempotency
            path: ./docs/pages/idempotency.mdx
          - page: Rate Limits
            path: ./docs/pages/rate-limits.mdx
          - page: Content Types
            path: ./docs/pages/content-types.mdx

      - section: Examples
        skip-slug: true
        contents:
          - page: Sell from Claude Code
            path: ./docs/pages/example-claude-code.mdx
          - page: Sell from n8n
            path: ./docs/pages/example-n8n.mdx
          - page: Build a Storefront API
            path: ./docs/pages/example-storefront.mdx

      - section: Resources
        skip-slug: true
        contents:
          - page: FAQ
            path: ./docs/pages/faq.mdx
          - page: Community
            path: ./docs/pages/community.mdx

  - tab: api
    layout:
      - api: API Reference

  - tab: changelog
