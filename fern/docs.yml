instances:
  - url: listbee-docs.docs.buildwithfern.com
    custom-domain: docs.listbee.so

title: ListBee
logo:
  light: ./docs/assets/logo-light.svg
  dark: ./docs/assets/logo-dark.svg

colors:
  accent-primary: "#D97706"
  background: "#FFFFFF"

default-language: python

navbar-links:
  - type: primary
    text: Get API Key
    url: https://console.listbee.so

tabs:
  documentation:
    display-name: Documentation
    icon: book-open
    skip-slug: true
  api:
    display-name: API Reference
    icon: code
    skip-slug: true
  changelog:
    display-name: Changelog
    icon: clock
    changelog: ./docs/changelog

navigation:
  - tab: documentation
    layout:
      - section: Getting Started
        skip-slug: true
        contents:
          - page: Welcome
            path: ./docs/pages/welcome.mdx
          - page: Quickstart
            path: ./docs/pages/quickstart.mdx

      - section: Core Concepts
        skip-slug: true
        contents:
          - page: Authentication
            path: ./docs/pages/authentication.mdx
          - page: Listings
            path: ./docs/pages/listings.mdx
          - page: Deliverables
            path: ./docs/pages/deliverables.mdx
          - page: Orders
            path: ./docs/pages/orders.mdx
          - page: Fulfillment
            path: ./docs/pages/fulfillment.mdx
          - page: Events
            path: ./docs/pages/events.mdx
          - page: Readiness
            path: ./docs/pages/readiness.mdx

      - section: Guides
        skip-slug: true
        contents:
          - page: Checkout Schema
            slug: checkout-schema
            path: ./docs/pages/checkout-schema.mdx
          - page: Idempotency
            path: ./docs/pages/idempotency.mdx
          - page: Rate Limits
            slug: rate-limits
            path: ./docs/pages/rate-limits.mdx
          - page: Errors
            path: ./docs/pages/errors.mdx

      - section: Integration
        skip-slug: true
        contents:
          - page: MCP Server
            slug: mcp
            path: ./docs/pages/mcp.mdx
          - page: SDKs
            path: ./docs/pages/sdks.mdx
          - page: n8n
            path: ./docs/pages/n8n.mdx

      - section: Examples
        skip-slug: true
        contents:
          - page: Sell from Claude Code
            slug: example-claude-code
            path: ./docs/pages/example-claude-code.mdx
          - page: Sell from n8n
            slug: example-n8n
            path: ./docs/pages/example-n8n.mdx
          - page: Bulk-create listings
            slug: example-storefront
            path: ./docs/pages/example-storefront.mdx

      - section: Resources
        skip-slug: true
        contents:
          - page: Entity Model
            slug: entity-model
            path: ./docs/pages/entity-model.mdx
          - page: OpenAPI Spec
            slug: openapi
            path: ./docs/pages/openapi.mdx
          - page: Limitations
            path: ./docs/pages/limitations.mdx

  - tab: api
    layout:
      - api: API Reference

  - tab: changelog
