instances:
  - url: listbee-docs.docs.buildwithfern.com
    custom-domain: docs.listbee.so

title: ListBee
logo:
  light: ./docs/assets/logo-light.svg
  dark: ./docs/assets/logo-dark.svg

colors:
  accent-primary: "#D97706"
  background: "#FFFFFF"

default-language: python

navbar-links:
  - type: primary
    text: Get API Key
    url: https://console.listbee.so

tabs:
  documentation:
    display-name: Documentation
    icon: book-open
    skip-slug: true
  api:
    display-name: API Reference
    icon: code
    skip-slug: true
  changelog:
    display-name: Changelog
    icon: clock
    changelog: ./docs/changelog

navigation:
  - tab: documentation
    layout:
      - section: Getting Started
        skip-slug: true
        contents:
          - page: Welcome
            path: ./docs/pages/welcome.mdx
          - page: Introduction
            path: ./docs/pages/introduction.mdx
          - page: Quickstart
            path: ./docs/pages/quickstart.mdx

      - section: Core Concepts
        skip-slug: true
        contents:
          - page: Listings
            path: ./docs/pages/listings.mdx
          - page: Listing Lifecycle
            slug: listing-lifecycle
            path: ./docs/pages/listing-lifecycle.mdx
          - page: Orders & Delivery
            slug: orders
            path: ./docs/pages/orders.mdx
          - page: Fulfillment Modes
            slug: fulfillment-modes
            path: ./docs/pages/fulfillment-modes.mdx
          - page: Deliverables
            slug: deliverables
            path: ./docs/pages/deliverables.mdx
          - page: Readiness System
            slug: readiness
            path: ./docs/pages/readiness.mdx
          - page: Account
            path: ./docs/pages/account.mdx
          - page: Payments
            path: ./docs/pages/payments.mdx
          - page: Billing
            path: ./docs/pages/billing.mdx
          - page: Webhooks
            path: ./docs/pages/webhooks.mdx
          - page: Errors
            path: ./docs/pages/errors.mdx
          - page: Entity Model
            slug: entity-model
            path: ./docs/pages/entity-model.mdx

      - section: Agent Integration
        skip-slug: true
        contents:
          - page: Agent Onboarding Flow
            slug: agent-onboarding
            path: ./docs/pages/agent-onboarding.mdx
          - page: MCP Server
            slug: mcp
            path: ./docs/pages/mcp.mdx
          - page: Claude Code Skill
            slug: claude-code-skill
            path: ./docs/pages/claude-code-skill.mdx

      - section: Guides
